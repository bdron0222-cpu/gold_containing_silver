name: Daily Stock Scanner

on:
  schedule:
    # 台灣時間 14:00 (UTC 06:00)
    - cron: '0 6 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 【修正重點】：補上 lxml 套件，這是解析網頁資料的必備工具
      - name: Install dependencies
        run: |
          pip install pandas requests yfinance lxml

      - name: Run Fetcher
        run: python fetch_stock_list.py

      - name: Run Scanner
        run: python scanner.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 【心跳機制】：產生一個心跳檔案，確保每天都有變動
          echo "Last run: $(date)" > heartbeat.txt
          
          # 加入所有 CSV 檔與心跳檔
          git add *.csv heartbeat.txt
          
          # 如果有變更才 commit
          git commit -m "自動更新: 每日選股結果與心跳" || exit 0
          
          # 推送到 GitHub
          git push
