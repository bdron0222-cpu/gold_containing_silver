name: Daily Stock Scanner

on:
  schedule:
    # 台灣時間 14:00 (UTC 06:00)
    - cron: '0 6 * * *'
  workflow_dispatch: 

# 【新增】給予 GitHub Actions 寫入權限，確保能夠推送 CSV 檔
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 【更新】升級為 v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests yfinance

      - name: Run Fetcher
        run: python fetch_stock_list.py

      - name: Run Scanner
        run: python scanner.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "自動更新: 每日選股結果"
          file_pattern: "*.csv"